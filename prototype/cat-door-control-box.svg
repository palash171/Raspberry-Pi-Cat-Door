<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f4ef"/>
      <stop offset="100%" stop-color="#f6ede3"/>
    </linearGradient>
    <linearGradient id="box3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#aeb7bd"/>
      <stop offset="100%" stop-color="#7d878e"/>
    </linearGradient>
    <linearGradient id="lid3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f5"/>
      <stop offset="100%" stop-color="#d5dde1"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#6f6963" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow3" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#20312b"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #17211d; }
      .sub { font: 400 24px Arial, Helvetica, sans-serif; fill: #4d5c56; }
      .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #17211d; }
      .body { font: 400 19px Arial, Helvetica, sans-serif; fill: #40514b; }
      .callout { fill: #fbf8f2; stroke: #d7d0c5; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg3)"/>
  <text x="110" y="110" class="title">Prototype 3: Inside Control Box</text>
  <text x="110" y="148" class="sub">Pack the Pi, fuse, regulator, wiring, and servo cable into one weatherproof service box</text>

  <g opacity="0.22">
    <path d="M100 220 H1700" stroke="#d7d1c7" stroke-width="2"/>
    <path d="M100 380 H1700" stroke="#d7d1c7" stroke-width="2"/>
    <path d="M100 540 H1700" stroke="#d7d1c7" stroke-width="2"/>
    <path d="M100 700 H1700" stroke="#d7d1c7" stroke-width="2"/>
    <path d="M100 860 H1700" stroke="#d7d1c7" stroke-width="2"/>
    <path d="M100 1020 H1700" stroke="#d7d1c7" stroke-width="2"/>
  </g>

  <g filter="url(#shadow3)">
    <rect x="236" y="246" width="894" height="664" rx="42" fill="url(#box3)"/>
    <rect x="292" y="300" width="782" height="554" rx="28" fill="#f2f5f6"/>
    <path d="M222 300 L534 132 Q588 112 632 148 L938 402" fill="url(#lid3)" stroke="#cfd9dd" stroke-width="6"/>
    <circle cx="948" cy="396" r="16" fill="#9eabb1"/>
  </g>

  <g filter="url(#shadow3)">
    <rect x="394" y="374" width="310" height="180" rx="22" fill="#4ea963"/>
    <rect x="444" y="420" width="212" height="84" rx="12" fill="#293137"/>
    <circle cx="442" cy="520" r="8" fill="#f2d36b"/>
    <circle cx="472" cy="520" r="8" fill="#f2d36b"/>
    <circle cx="502" cy="520" r="8" fill="#f2d36b"/>
    <circle cx="532" cy="520" r="8" fill="#f2d36b"/>
    <rect x="748" y="378" width="180" height="114" rx="18" fill="#f4c45b"/>
    <rect x="748" y="530" width="190" height="86" rx="16" fill="#535f66"/>
    <rect x="748" y="644" width="198" height="86" rx="16" fill="#2f3438"/>
    <rect x="398" y="604" width="272" height="118" rx="18" fill="#dce4e7"/>
    <rect x="394" y="754" width="572" height="72" rx="18" fill="#65737c"/>
    <circle cx="992" cy="778" r="11" fill="#57c169"/>
    <circle cx="992" cy="814" r="11" fill="#eb7a5d"/>
    <rect x="1026" y="752" width="28" height="82" rx="10" fill="#d3dbde"/>
  </g>

  <g filter="url(#shadow3)">
    <rect x="1116" y="346" width="88" height="504" rx="24" fill="#b1b9be"/>
    <rect x="1134" y="368" width="52" height="456" rx="18" fill="#d9e0e4"/>
    <circle cx="1160" cy="424" r="12" fill="#707f87"/>
    <circle cx="1160" cy="768" r="12" fill="#707f87"/>
  </g>

  <path d="M1130 590 C1244 590 1260 592 1306 618" stroke="#505e64" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1130 730 C1240 730 1268 730 1316 712" stroke="#505e64" stroke-width="10" fill="none" stroke-linecap="round"/>

  <g filter="url(#shadow3)">
    <rect x="1290" y="520" width="160" height="126" rx="24" fill="#525d63"/>
    <rect x="1322" y="552" width="96" height="34" rx="10" fill="#232a2e"/>
    <circle cx="1330" cy="612" r="10" fill="#f2d36b"/>
    <circle cx="1360" cy="612" r="10" fill="#f2d36b"/>
    <circle cx="1390" cy="612" r="10" fill="#f2d36b"/>
    <circle cx="1420" cy="612" r="10" fill="#f2d36b"/>
  </g>

  <g>
    <rect x="98" y="284" width="318" height="120" rx="22" class="callout"/>
    <text x="128" y="336" class="label">PI ZERO 2 W</text>
    <text x="128" y="370" class="body">Main board for Telegram, camera capture,</text>
    <text x="128" y="398" class="body">and the simple GPIO logic.</text>
    <path d="M416 344 C472 348 496 376 550 432" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="96" y="480" width="318" height="118" rx="22" class="callout"/>
    <text x="126" y="530" class="label">5V BUCK REGULATOR</text>
    <text x="126" y="564" class="body">Take 12V in here, then feed the Pi and</text>
    <text x="126" y="592" class="body">servo rail with clean 5V.</text>
    <path d="M414 540 C504 532 626 484 748 438" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="98" y="666" width="318" height="118" rx="22" class="callout"/>
    <text x="128" y="716" class="label">INLINE FUSE</text>
    <text x="128" y="750" class="body">Put this right after power enters the box.</text>
    <text x="128" y="778" class="body">It is worth having.</text>
    <path d="M416 734 C490 734 608 698 748 686" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="1266" y="226" width="370" height="128" rx="22" class="callout"/>
    <text x="1296" y="278" class="label">CABLE GLANDS + DRIP LOOP</text>
    <text x="1296" y="312" class="body">All outside wires come in sealed, then drop</text>
    <text x="1296" y="340" class="body">before entering so water keeps falling away.</text>
    <path d="M1298 354 C1248 400 1194 460 1160 520" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="1260" y="432" width="384" height="124" rx="22" class="callout"/>
    <text x="1290" y="484" class="label">SERVO OUT TERMINALS</text>
    <text x="1290" y="518" class="body">This is the clean place to land the actuator,</text>
    <text x="1290" y="546" class="body">reed switch, and sensor lines.</text>
    <path d="M1290 518 C1260 542 1232 560 1450 580" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="1262" y="674" width="382" height="132" rx="22" class="callout"/>
    <text x="1292" y="726" class="label">DESICCANT + SERVICE SPACE</text>
    <text x="1292" y="760" class="body">Leave room for a silica pack and for your hand.</text>
    <text x="1292" y="788" class="body">Do not cram the box too hard.</text>
    <path d="M1262 742 C1216 744 1126 746 1054 794" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow3)"/>
  </g>

  <g>
    <rect x="420" y="956" width="680" height="136" rx="24" class="callout"/>
    <text x="450" y="1010" class="label">BOX LAYOUT IDEA</text>
    <text x="450" y="1046" class="body">Top row: Pi and regulator. Middle: fuse and terminals. Bottom: spare cable slack and service room.</text>
  </g>
</svg>
