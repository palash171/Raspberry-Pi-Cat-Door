<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e5efe9"/>
      <stop offset="100%" stop-color="#f7efe5"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151c23"/>
      <stop offset="100%" stop-color="#28343f"/>
    </linearGradient>
    <linearGradient id="chat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecf4fb"/>
      <stop offset="100%" stop-color="#ddeaf5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#7b7268" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 52px Arial, Helvetica, sans-serif; fill: #17211d; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #495a52; }
      .phoneTop { font: 700 24px Arial, Helvetica, sans-serif; fill: #f1f7ff; }
      .phoneText { font: 400 22px Arial, Helvetica, sans-serif; fill: #1f3140; }
      .phoneSmall { font: 400 18px Arial, Helvetica, sans-serif; fill: #5d7283; }
      .btn { font: 700 24px Arial, Helvetica, sans-serif; fill: #f7fbff; }
      .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #18211d; }
      .body { font: 400 20px Arial, Helvetica, sans-serif; fill: #43544c; }
      .tiny { font: 700 15px Arial, Helvetica, sans-serif; fill: #55655f; letter-spacing: 1.5px; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#22312b"/>
    </marker>
  </defs>

  <rect width="1600" height="1600" fill="url(#bg)"/>
  <text x="126" y="108" class="title">Prototype C: Telegram Approval Screen</text>
  <text x="126" y="146" class="subtitle">The phone interaction that tells you a cat is at the door and lets you decide what happens next</text>

  <g opacity="0.25">
    <circle cx="1340" cy="250" r="160" fill="#d1e3d4"/>
    <circle cx="270" cy="1280" r="190" fill="#ecd9bf"/>
    <circle cx="1460" cy="1300" r="120" fill="#d6e4ef"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="210" width="600" height="1180" rx="66" fill="url(#phone)"/>
    <rect x="542" y="290" width="516" height="1014" rx="42" fill="url(#chat)"/>
    <rect x="730" y="240" width="140" height="20" rx="10" fill="#28333f"/>
    <circle cx="800" cy="1340" r="28" fill="#2c3945"/>
  </g>

  <rect x="576" y="330" width="448" height="84" rx="22" fill="#1a2937"/>
  <text x="614" y="382" class="phoneTop">Cat Door Bot</text>
  <text x="904" y="382" class="phoneSmall" fill="#b9c7d4">online</text>

  <rect x="590" y="448" width="420" height="232" rx="24" fill="#ffffff"/>
  <rect x="616" y="474" width="152" height="182" rx="18" fill="#d2dbe4"/>
  <ellipse cx="684" cy="574" rx="42" ry="28" fill="#7f8d98"/>
  <circle cx="726" cy="558" r="14" fill="#7f8d98"/>
  <path d="M646 606 Q686 650 746 618" fill="none" stroke="#7f8d98" stroke-width="9" stroke-linecap="round"/>
  <text x="794" y="512" class="phoneText">Motion detected at the flap.</text>
  <text x="794" y="548" class="phoneText">Night snapshot attached.</text>
  <text x="794" y="590" class="phoneText">Approve opening?</text>
  <text x="794" y="632" class="phoneSmall">00:18</text>

  <rect x="606" y="724" width="388" height="86" rx="22" fill="#5db676"/>
  <text x="734" y="778" class="btn">OPEN DOOR</text>

  <rect x="606" y="832" width="388" height="86" rx="22" fill="#df6d56"/>
  <text x="710" y="886" class="btn">KEEP CLOSED</text>

  <rect x="606" y="940" width="388" height="58" rx="18" fill="#d8e4ed"/>
  <text x="686" y="977" class="phoneText">LOCK FOR 5 MINUTES</text>

  <rect x="590" y="1044" width="420" height="144" rx="24" fill="#ffffff"/>
  <text x="620" y="1092" class="label">What happens after you tap</text>
  <text x="620" y="1130" class="body">`Open Door`: servo lifts the flap, timer runs,</text>
  <text x="620" y="1158" class="body">reed switch confirms it closes again afterward.</text>

  <g>
    <rect x="124" y="336" width="292" height="128" rx="24" fill="#faf8f2" stroke="#d8d0c5" stroke-width="3"/>
    <text x="154" y="388" class="label">Photo first</text>
    <text x="154" y="422" class="body">You get a real image, not just</text>
    <text x="154" y="450" class="body">a blind motion alert.</text>
    <path d="M416 410 C488 424 546 430 590 520" stroke="#22312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1180" y="506" width="294" height="130" rx="24" fill="#faf8f2" stroke="#d8d0c5" stroke-width="3"/>
    <text x="1210" y="558" class="label">Simple control</text>
    <text x="1210" y="592" class="body">Two big buttons keep the</text>
    <text x="1210" y="620" class="body">first version easy to use.</text>
    <path d="M1180 570 C1122 570 1072 570 994 760" stroke="#22312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1166" y="948" width="308" height="140" rx="24" fill="#faf8f2" stroke="#d8d0c5" stroke-width="3"/>
    <text x="1196" y="1000" class="label">Fail-safe idea</text>
    <text x="1196" y="1034" class="body">If you do nothing, the bot can</text>
    <text x="1196" y="1062" class="body">default to `keep closed`.</text>
    <path d="M1166 1018 C1100 1018 1040 1018 1002 1068" stroke="#22312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="126" y="1166" width="372" height="150" rx="24" fill="#faf8f2" stroke="#d8d0c5" stroke-width="3"/>
    <text x="158" y="1218" class="label">Nice upgrade later</text>
    <text x="158" y="1252" class="body">Add a third button like `Unlock only`</text>
    <text x="158" y="1280" class="body">or `Open for 10 seconds` once the</text>
    <text x="158" y="1308" class="body">basic version is working well.</text>
    <path d="M498 1238 C558 1224 598 1170 606 988" stroke="#22312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <text x="126" y="1500" class="tiny">USER EXPERIENCE GOAL</text>
  <text x="126" y="1538" class="body">You should be able to glance at your phone, see whether it is actually your cat, and approve opening in one tap.</text>
</svg>
