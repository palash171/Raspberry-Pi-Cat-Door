<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3ee"/>
      <stop offset="100%" stop-color="#f7efe4"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9e2d7"/>
      <stop offset="50%" stop-color="#9f6538"/>
      <stop offset="100%" stop-color="#d8d0c3"/>
    </linearGradient>
    <linearGradient id="flap4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c2dfeb"/>
      <stop offset="100%" stop-color="#7fa9c0"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#746c63" flood-opacity="0.23"/>
    </filter>
    <marker id="arrow4" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#21312b"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #18231f; }
      .sub { font: 400 24px Arial, Helvetica, sans-serif; fill: #4c5b55; }
      .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #18231f; }
      .body { font: 400 19px Arial, Helvetica, sans-serif; fill: #40514b; }
      .callout { fill: #fbf8f2; stroke: #d8d0c5; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg4)"/>
  <text x="110" y="110" class="title">Prototype 4: Flap Mechanism Side View</text>
  <text x="110" y="148" class="sub">A very copyable first mechanism: servo inside, short rod, flap hinge, return spring, and closed-state sensor</text>

  <g filter="url(#shadow4)">
    <rect x="352" y="206" width="1098" height="700" rx="28" fill="url(#wall)"/>
    <rect x="772" y="422" width="252" height="300" rx="22" fill="#22292d"/>
    <g transform="rotate(-24 916 578)">
      <rect x="814" y="468" width="204" height="220" rx="18" fill="url(#flap4)" stroke="#e2f0f6" stroke-width="4"/>
    </g>
    <circle cx="900" cy="428" r="14" fill="#202528"/>
    <path d="M900 428 L1016 392" stroke="#a6b1b6" stroke-width="12" stroke-linecap="round"/>
    <rect x="1138" y="420" width="132" height="330" rx="28" fill="#566166"/>
    <rect x="1160" y="466" width="86" height="110" rx="12" fill="#838e94"/>
    <circle cx="1203" cy="522" r="18" fill="#1f262a"/>
    <path d="M1203 522 L1038 468" stroke="#a6b1b6" stroke-width="12" stroke-linecap="round"/>
    <rect x="1190" y="612" width="26" height="88" rx="10" fill="#9aa5ab"/>
    <path d="M766 414 Q726 470 752 548" fill="none" stroke="#cfd8dc" stroke-width="10" stroke-linecap="round"/>
    <path d="M752 548 Q774 614 744 662" fill="none" stroke="#cfd8dc" stroke-width="10" stroke-linecap="round"/>
    <rect x="1034" y="720" width="22" height="28" rx="6" fill="#f5f7f8"/>
    <rect x="1056" y="728" width="18" height="12" rx="4" fill="#24292c"/>
    <circle cx="896" cy="748" r="12" fill="#f3f4f6"/>
    <rect x="884" y="746" width="18" height="92" rx="8" fill="#e0e4e6"/>
  </g>

  <g opacity="0.16">
    <rect x="160" y="968" width="1480" height="2" fill="#cfc6ba"/>
  </g>

  <g>
    <rect x="78" y="286" width="350" height="126" rx="22" class="callout"/>
    <text x="108" y="338" class="label">HINGE TOP EDGE</text>
    <text x="108" y="372" class="body">Keep the flap pivot at the top so the</text>
    <text x="108" y="400" class="body">linkage only has to lift it open.</text>
    <path d="M428 352 C542 348 706 352 900 428" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="86" y="518" width="352" height="126" rx="22" class="callout"/>
    <text x="116" y="570" class="label">RETURN SPRING</text>
    <text x="116" y="604" class="body">A light spring or gravity helps the flap</text>
    <text x="116" y="632" class="body">come shut after the servo releases.</text>
    <path d="M438 588 C536 584 640 576 742 604" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="84" y="760" width="356" height="126" rx="22" class="callout"/>
    <text x="114" y="812" class="label">MAGNET ON FLAP</text>
    <text x="114" y="846" class="body">Keep the magnet on the moving flap and</text>
    <text x="114" y="874" class="body">the reed switch on the fixed frame.</text>
    <path d="M440 822 C566 816 690 812 884 776" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="1364" y="278" width="326" height="122" rx="22" class="callout"/>
    <text x="1394" y="330" class="label">SERVO BODY</text>
    <text x="1394" y="364" class="body">Mount this on the dry side with a proper</text>
    <text x="1394" y="392" class="body">bracket, not loose on tape.</text>
    <path d="M1364 338 C1320 366 1272 414 1212 470" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="1348" y="500" width="338" height="128" rx="22" class="callout"/>
    <text x="1378" y="552" class="label">SHORT METAL LINKAGE</text>
    <text x="1378" y="586" class="body">Use a short rigid rod here so there is less</text>
    <text x="1378" y="614" class="body">flex and the motion stays predictable.</text>
    <path d="M1348 566 C1284 566 1228 548 1203 522" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="1346" y="724" width="344" height="126" rx="22" class="callout"/>
    <text x="1376" y="776" class="label">REED SWITCH ON FRAME</text>
    <text x="1376" y="810" class="body">This tells the Pi the flap actually made it</text>
    <text x="1376" y="838" class="body">back to the shut position.</text>
    <path d="M1346 788 C1292 788 1208 788 1070 736" stroke="#21312b" stroke-width="4" fill="none" marker-end="url(#arrow4)"/>
  </g>

  <g>
    <rect x="462" y="954" width="874" height="132" rx="24" class="callout"/>
    <text x="492" y="1008" class="label">MECHANISM IDEA</text>
    <text x="492" y="1044" class="body">This is the simplest moving setup to prototype first. If the flap is too heavy later, swap the servo for a geared motor and end-stops.</text>
  </g>
</svg>
