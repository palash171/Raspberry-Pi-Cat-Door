<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4ed"/>
      <stop offset="100%" stop-color="#efe7db"/>
    </linearGradient>
    <linearGradient id="boxBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8b1b6"/>
      <stop offset="100%" stop-color="#7d878d"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3f5" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#d9dfe2" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2331"/>
      <stop offset="100%" stop-color="#263548"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#7b746a" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#23312c"/>
    </marker>
    <style>
      .title { font: 700 50px Arial, Helvetica, sans-serif; fill: #1d2622; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #56655f; }
      .label { font: 700 22px Arial, Helvetica, sans-serif; fill: #1d2925; }
      .body { font: 400 19px Arial, Helvetica, sans-serif; fill: #3c4c46; }
      .tiny { font: 700 15px Arial, Helvetica, sans-serif; fill: #52625c; letter-spacing: 1.4px; }
      .part { font: 700 20px Arial, Helvetica, sans-serif; fill: #22302b; }
      .small { font: 400 17px Arial, Helvetica, sans-serif; fill: #41524b; }
      .phoneHeader { font: 700 22px Arial, Helvetica, sans-serif; fill: #eff6ff; }
      .phoneText { font: 400 18px Arial, Helvetica, sans-serif; fill: #20303c; }
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#paper)"/>

  <g opacity="0.2">
    <path d="M80 180 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 340 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 500 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 660 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 820 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 980 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 1140 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M80 1300 H1520" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M240 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M480 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M720 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M960 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M1200 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
    <path d="M1440 120 V1480" stroke="#cfcbc3" stroke-width="2"/>
  </g>

  <text x="120" y="102" class="title">Prototype B: Cutaway Layout and Connections</text>
  <text x="120" y="140" class="subtitle">What sits inside the box, what attaches to the door, and how the Telegram control loop fits in</text>

  <g filter="url(#shadow)">
    <rect x="130" y="260" width="700" height="770" rx="36" fill="url(#boxBody)"/>
    <rect x="168" y="302" width="624" height="686" rx="24" fill="#f4f7f7"/>
    <path d="M118 300 L390 188 Q430 170 468 198 L694 368" fill="url(#lid)" stroke="#cfd8db" stroke-width="6"/>
    <rect x="226" y="262" width="260" height="36" rx="16" fill="#dbe3e7" opacity="0.55"/>
    <circle cx="702" cy="370" r="14" fill="#97a3a8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="236" y="380" width="250" height="150" rx="18" fill="#4ca55f"/>
    <rect x="274" y="414" width="170" height="70" rx="10" fill="#273037"/>
    <circle cx="276" cy="498" r="8" fill="#f0d26d"/>
    <circle cx="304" cy="498" r="8" fill="#f0d26d"/>
    <circle cx="332" cy="498" r="8" fill="#f0d26d"/>
    <circle cx="360" cy="498" r="8" fill="#f0d26d"/>
    <rect x="502" y="386" width="160" height="96" rx="18" fill="#f0be58"/>
    <rect x="502" y="512" width="160" height="70" rx="14" fill="#4e5a60"/>
    <rect x="502" y="606" width="160" height="70" rx="14" fill="#2f3438"/>
    <rect x="236" y="576" width="210" height="92" rx="16" fill="#dfe7ea"/>
    <circle cx="268" cy="622" r="18" fill="#d4dbde"/>
    <rect x="236" y="718" width="190" height="78" rx="14" fill="#ffffff"/>
    <rect x="236" y="828" width="360" height="82" rx="16" fill="#5c6b73"/>
    <circle cx="612" cy="846" r="10" fill="#59c269"/>
    <circle cx="612" cy="882" r="10" fill="#e6755e"/>
  </g>

  <text x="248" y="1008" class="tiny">INSIDE THE CONTROL BOX</text>

  <g>
    <rect x="112" y="1090" width="742" height="328" rx="30" fill="#faf7f2" stroke="#d9d0c4" stroke-width="4"/>
    <text x="152" y="1146" class="label">How the pieces connect</text>

    <circle cx="198" cy="1230" r="26" fill="#d7e7d8"/>
    <text x="188" y="1238" class="part">1</text>
    <text x="242" y="1224" class="part">12V wall power enters the box</text>
    <text x="242" y="1250" class="small">through a sealed cable gland, then hits an inline fuse first.</text>

    <circle cx="198" cy="1298" r="26" fill="#d7e7d8"/>
    <text x="188" y="1306" class="part">2</text>
    <text x="242" y="1292" class="part">Buck regulation feeds the Pi and actuator</text>
    <text x="242" y="1318" class="small">so the Raspberry Pi gets clean 5V and the servo gets its own rail.</text>

    <circle cx="198" cy="1366" r="26" fill="#d7e7d8"/>
    <text x="188" y="1374" class="part">3</text>
    <text x="242" y="1360" class="part">GPIO lines handle the simple door logic</text>
    <text x="242" y="1386" class="small">camera trigger, reed switch status, and the open/close motor signal.</text>
  </g>

  <g>
    <rect x="904" y="262" width="566" height="360" rx="32" fill="#f7f4ee" stroke="#d9d1c6" stroke-width="4"/>
    <text x="940" y="320" class="label">Door-side hardware</text>

    <rect x="970" y="386" width="122" height="168" rx="24" fill="#525d62"/>
    <rect x="994" y="418" width="74" height="66" rx="12" fill="#808c92"/>
    <circle cx="1031" cy="451" r="16" fill="#22292c"/>
    <rect x="1016" y="494" width="30" height="40" rx="8" fill="#99a4aa"/>
    <path d="M1031 451 L1126 432" stroke="#9eaab0" stroke-width="10" stroke-linecap="round"/>
    <path d="M1126 432 L1126 386" stroke="#9eaab0" stroke-width="10" stroke-linecap="round"/>

    <rect x="1134" y="378" width="194" height="238" rx="18" fill="#23292d"/>
    <rect x="1158" y="406" width="146" height="190" rx="12" fill="#a8d2e5" fill-opacity="0.88"/>
    <rect x="1174" y="356" width="112" height="26" rx="12" fill="#1a1f22"/>
    <rect x="1184" y="318" width="92" height="30" rx="12" fill="#252d31"/>
    <circle cx="1204" cy="333" r="6" fill="#f0d26d"/>
    <circle cx="1223" cy="333" r="6" fill="#f0d26d"/>
    <circle cx="1242" cy="333" r="6" fill="#f0d26d"/>
    <circle cx="1261" cy="333" r="6" fill="#f0d26d"/>

    <rect x="1334" y="418" width="20" height="26" rx="5" fill="#f6f6f6"/>
    <rect x="1354" y="424" width="20" height="12" rx="4" fill="#23282b"/>

  </g>

  <g>
    <rect x="930" y="648" width="168" height="90" rx="22" fill="#faf7f2" stroke="#d9d0c4" stroke-width="3"/>
    <text x="954" y="692" class="part">Servo housing</text>
    <text x="954" y="720" class="small">Short linkage pulls the flap.</text>
  </g>

  <g>
    <rect x="1116" y="648" width="168" height="90" rx="22" fill="#faf7f2" stroke="#d9d0c4" stroke-width="3"/>
    <text x="1144" y="692" class="part">Camera + IR</text>
    <text x="1144" y="720" class="small">Night view of the flap area.</text>
  </g>

  <g>
    <rect x="1302" y="648" width="168" height="90" rx="22" fill="#faf7f2" stroke="#d9d0c4" stroke-width="3"/>
    <text x="1328" y="692" class="part">Reed switch</text>
    <text x="1328" y="720" class="small">Confirms the flap is closed.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="948" y="732" width="486" height="734" rx="54" fill="#0f1419"/>
    <rect x="980" y="794" width="422" height="610" rx="38" fill="#edf3f8"/>
    <rect x="1132" y="754" width="120" height="18" rx="9" fill="#242d36"/>
    <circle cx="1180" cy="1436" r="22" fill="#2d3640"/>

    <rect x="1010" y="824" width="362" height="70" rx="18" fill="url(#screen)"/>
    <text x="1040" y="870" class="phoneHeader">Telegram: Cat Door Bot</text>

    <rect x="1010" y="930" width="362" height="196" rx="22" fill="#ffffff"/>
    <rect x="1038" y="956" width="120" height="144" rx="14" fill="#d7dfeb"/>
    <ellipse cx="1098" cy="1042" rx="34" ry="22" fill="#7d8b96"/>
    <circle cx="1134" cy="1028" r="12" fill="#7d8b96"/>
    <path d="M1066 1070 Q1096 1108 1140 1082" fill="none" stroke="#7d8b96" stroke-width="8" stroke-linecap="round"/>
    <text x="1186" y="982" class="phoneText">Motion at the flap.</text>
    <text x="1186" y="1012" class="phoneText">Photo attached for approval.</text>
    <text x="1186" y="1052" class="phoneText">Tap a button:</text>

    <rect x="1028" y="1160" width="326" height="74" rx="18" fill="#63b979"/>
    <text x="1146" y="1207" class="phoneHeader">OPEN DOOR</text>

    <rect x="1028" y="1250" width="326" height="74" rx="18" fill="#e36e57"/>
    <text x="1134" y="1297" class="phoneHeader">KEEP CLOSED</text>

    <rect x="1028" y="1340" width="326" height="42" rx="14" fill="#d8e2ea"/>
    <text x="1098" y="1368" class="phoneText">Optional: lock for 5 min</text>
  </g>

  <g>
    <rect x="892" y="1128" width="410" height="120" rx="24" fill="#faf7f2" stroke="#d9d0c4" stroke-width="3"/>
    <text x="924" y="1178" class="label">Telegram flow</text>
    <text x="924" y="1212" class="body">The Pi sends a photo using the Telegram Bot API,</text>
    <text x="924" y="1240" class="body">then listens for your Open / Close button callback.</text>
  </g>

  <path d="M662 438 C748 438 770 410 956 334" stroke="#23312c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M582 564 C700 612 846 774 996 906" stroke="#23312c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M612 862 C760 894 840 882 934 874" stroke="#23312c" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M456 620 C732 620 886 614 1018 730" stroke="#23312c" stroke-width="4" fill="none" stroke-dasharray="10 10" marker-end="url(#arrow)"/>

  <g>
    <rect x="110" y="178" width="530" height="98" rx="28" fill="#faf7f2" stroke="#d9d0c4" stroke-width="4"/>
    <text x="148" y="228" class="label">Why this layout works</text>
    <text x="148" y="258" class="body">Simple for a first build, but still easy to upgrade later.</text>
  </g>

  <g>
    <rect x="920" y="178" width="552" height="98" rx="28" fill="#faf7f2" stroke="#d9d0c4" stroke-width="4"/>
    <text x="958" y="228" class="label">Prototype logic in one sentence</text>
    <text x="958" y="258" class="body">Wake on motion, send photo, wait for approval, then move the flap.</text>
  </g>
</svg>
