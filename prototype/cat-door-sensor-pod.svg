<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2f4"/>
      <stop offset="100%" stop-color="#f8efe4"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f383b"/>
      <stop offset="100%" stop-color="#14191c"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7dde1"/>
      <stop offset="100%" stop-color="#9ba4ab"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#6f6a64" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow2" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#1f3029"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #18231f; }
      .sub { font: 400 24px Arial, Helvetica, sans-serif; fill: #4a5a53; }
      .label { font: 700 24px Arial, Helvetica, sans-serif; fill: #18231f; }
      .body { font: 400 19px Arial, Helvetica, sans-serif; fill: #40514b; }
      .callout { fill: #fbf8f2; stroke: #d8d0c5; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg2)"/>

  <text x="110" y="110" class="title">Prototype 2: Outdoor Sensor Pod</text>
  <text x="110" y="148" class="sub">This is the easiest little outside module to copy: hood, camera, PIR, IR LEDs, and sealed cable exit</text>

  <g opacity="0.28">
    <circle cx="1540" cy="260" r="170" fill="#d7e3da"/>
    <circle cx="260" cy="1040" r="210" fill="#ead8c3"/>
  </g>

  <g filter="url(#shadow2)">
    <path d="M542 262 L1238 262 L1300 422 L476 422 Z" fill="url(#hood)"/>
    <rect x="520" y="404" width="740" height="422" rx="38" fill="#20272b"/>
    <rect x="560" y="448" width="660" height="338" rx="26" fill="#f0f3f4"/>
    <rect x="716" y="504" width="308" height="214" rx="22" fill="#21292d"/>
    <rect x="772" y="552" width="196" height="126" rx="16" fill="#a0c3d4"/>
    <circle cx="870" cy="616" r="22" fill="#3d6277"/>
    <circle cx="648" cy="616" r="72" fill="#edf2f4"/>
    <circle cx="648" cy="616" r="28" fill="#d2dbe0"/>
    <circle cx="1090" cy="560" r="34" fill="#f4d26d"/>
    <circle cx="1146" cy="560" r="34" fill="#f4d26d"/>
    <circle cx="1090" cy="668" r="34" fill="#f4d26d"/>
    <circle cx="1146" cy="668" r="34" fill="#f4d26d"/>
    <rect x="628" y="760" width="520" height="34" rx="12" fill="#b3bcc2"/>
    <rect x="804" y="790" width="160" height="74" rx="14" fill="#b7c0c5"/>
    <rect x="840" y="804" width="88" height="42" rx="10" fill="#6c7880"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="726" y="854" width="292" height="168" rx="30" fill="url(#bracket)"/>
    <rect x="756" y="888" width="232" height="104" rx="18" fill="#dde4e8"/>
    <circle cx="798" cy="940" r="10" fill="#7b8890"/>
    <circle cx="946" cy="940" r="10" fill="#7b8890"/>
  </g>

  <g>
    <rect x="86" y="264" width="314" height="116" rx="22" class="callout"/>
    <text x="116" y="314" class="label">RAIN HOOD</text>
    <text x="116" y="348" class="body">Mount this like a mini visor so water</text>
    <text x="116" y="376" class="body">runs off before it reaches the parts.</text>
    <path d="M400 330 C498 330 524 320 610 294" stroke="#1f3029" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="84" y="470" width="320" height="118" rx="22" class="callout"/>
    <text x="114" y="520" class="label">PIR DOME</text>
    <text x="114" y="554" class="body">Leave this exposed under the hood.</text>
    <text x="114" y="582" class="body">Do not hide it behind acrylic.</text>
    <path d="M404 542 C488 542 520 560 576 604" stroke="#1f3029" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="1334" y="406" width="336" height="128" rx="22" class="callout"/>
    <text x="1364" y="458" class="label">CAMERA 3 NOIR</text>
    <text x="1364" y="492" class="body">Main center position so the photo points</text>
    <text x="1364" y="520" class="body">straight at the cat flap area.</text>
    <path d="M1334 470 C1244 498 1138 560 928 614" stroke="#1f3029" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="1338" y="590" width="334" height="134" rx="22" class="callout"/>
    <text x="1368" y="642" class="label">850nm IR LED PAIR</text>
    <text x="1368" y="676" class="body">Mount these slightly off-axis so the camera</text>
    <text x="1368" y="704" class="body">doesn't get glare back off the flap.</text>
    <path d="M1338 656 C1278 654 1242 648 1170 644" stroke="#1f3029" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="1240" y="864" width="428" height="126" rx="22" class="callout"/>
    <text x="1270" y="914" class="label">SEALED BACK PLATE</text>
    <text x="1270" y="948" class="body">Run the ribbon and wires through the rear, then clamp them with a gland or gasketed exit.</text>
    <path d="M1240 928 C1176 928 1086 930 1016 930" stroke="#1f3029" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  </g>

  <g>
    <rect x="126" y="882" width="492" height="150" rx="24" class="callout"/>
    <text x="156" y="936" class="label">GOOD BUILD TARGET</text>
    <text x="156" y="972" class="body">Think of this as one outdoor module you can screw onto the door or wall,</text>
    <text x="156" y="1000" class="body">then run one protected cable bundle back to the inside box.</text>
  </g>
</svg>
