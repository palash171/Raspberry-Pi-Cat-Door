<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe6dc"/>
      <stop offset="100%" stop-color="#eef1ea"/>
    </linearGradient>
    <linearGradient id="doorWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8c552f"/>
      <stop offset="45%" stop-color="#9d6438"/>
      <stop offset="100%" stop-color="#6f4020"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fc6d8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d9f2ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7d9eb" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6ea7c3" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="boxLid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf2f4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d7dde0" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#6e726f" flood-opacity="0.26"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7a7a7a" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#1f2c28"/>
    </marker>
    <style>
      .title { font: 700 52px Arial, Helvetica, sans-serif; fill: #18211d; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #44554d; }
      .calloutTitle { font: 700 24px Arial, Helvetica, sans-serif; fill: #16201c; }
      .calloutBody { font: 400 20px Arial, Helvetica, sans-serif; fill: #31413b; }
      .tiny { font: 600 15px Arial, Helvetica, sans-serif; fill: #42534c; letter-spacing: 1.5px; }
      .panelText { font: 700 18px Arial, Helvetica, sans-serif; fill: #24322d; }
      .note { font: 400 20px Arial, Helvetica, sans-serif; fill: #42534c; }
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#bg)"/>
  <rect x="0" y="180" width="1600" height="1080" fill="#ced8ce"/>
  <g opacity="0.45">
    <rect x="0" y="210" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="320" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="430" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="540" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="650" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="760" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="870" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="980" width="1600" height="6" fill="#b5c0b5"/>
    <rect x="0" y="1090" width="1600" height="6" fill="#b5c0b5"/>
  </g>
  <rect x="0" y="1260" width="1600" height="340" fill="#b38a61"/>
  <rect x="0" y="1260" width="1600" height="26" fill="#996f49"/>

  <text x="140" y="110" class="title">Prototype A: Door-mounted Smart Cat Door</text>
  <text x="140" y="148" class="subtitle">Night vision camera, control box, motorized flap, and Telegram approval flow</text>

  <g filter="url(#shadow)">
    <rect x="250" y="180" width="700" height="1100" rx="20" fill="#f7f4ef"/>
    <rect x="320" y="210" width="560" height="1040" rx="14" fill="url(#doorWood)"/>
    <rect x="354" y="244" width="492" height="972" rx="10" fill="none" stroke="#b9875a" stroke-width="4" opacity="0.6"/>
    <rect x="430" y="300" width="340" height="260" rx="10" fill="none" stroke="#d7ae84" stroke-width="8" opacity="0.9"/>
    <rect x="430" y="610" width="340" height="260" rx="10" fill="none" stroke="#d7ae84" stroke-width="8" opacity="0.7"/>
    <rect x="430" y="920" width="340" height="220" rx="10" fill="none" stroke="#d7ae84" stroke-width="8" opacity="0.7"/>
  </g>

  <g filter="url(#soft)">
    <rect x="470" y="345" width="260" height="160" rx="12" fill="url(#glass)" stroke="#e8f7ff" stroke-width="3"/>
    <path d="M486 486 C565 420 650 420 714 356" stroke="#ffffff" stroke-opacity="0.4" stroke-width="7" fill="none"/>
  </g>

  <g filter="url(#soft)">
    <rect x="466" y="796" width="238" height="266" rx="18" fill="#22292d"/>
    <rect x="490" y="822" width="190" height="218" rx="12" fill="url(#flap)" stroke="#d9f4ff" stroke-width="3"/>
    <rect x="532" y="782" width="102" height="24" rx="10" fill="#1b1f22"/>
    <path d="M490 830 L680 830" stroke="#dff4ff" stroke-opacity="0.6" stroke-width="4"/>
    <circle cx="680" cy="940" r="10" fill="#23292d"/>
  </g>

  <g filter="url(#soft)">
    <rect x="508" y="640" width="160" height="54" rx="16" fill="#1e2426"/>
    <path d="M500 660 L676 660 L648 610 L528 610 Z" fill="#303a3d"/>
    <rect x="546" y="650" width="82" height="28" rx="8" fill="#111518"/>
    <circle cx="586" cy="664" r="8" fill="#35566f"/>
    <circle cx="530" cy="678" r="6" fill="#f1d36c"/>
    <circle cx="552" cy="678" r="6" fill="#f1d36c"/>
    <circle cx="574" cy="678" r="6" fill="#f1d36c"/>
    <circle cx="596" cy="678" r="6" fill="#f1d36c"/>
    <circle cx="618" cy="678" r="6" fill="#f1d36c"/>
    <circle cx="640" cy="678" r="6" fill="#f1d36c"/>
  </g>

  <g filter="url(#soft)">
    <rect x="732" y="772" width="84" height="292" rx="20" fill="#545e63"/>
    <rect x="748" y="806" width="52" height="102" rx="10" fill="#808b90"/>
    <circle cx="774" cy="858" r="16" fill="#1f2427"/>
    <rect x="760" y="930" width="28" height="88" rx="9" fill="#9aa5aa"/>
    <circle cx="774" cy="1018" r="9" fill="#343c40"/>
  </g>

  <path d="M774 858 L706 842" stroke="#a2adb2" stroke-width="10" stroke-linecap="round"/>
  <path d="M706 842 L706 805" stroke="#a2adb2" stroke-width="10" stroke-linecap="round"/>

  <g filter="url(#soft)">
    <rect x="896" y="720" width="270" height="360" rx="26" fill="#b7bec2"/>
    <rect x="916" y="742" width="230" height="320" rx="18" fill="url(#boxLid)" stroke="#eef5f7" stroke-width="4"/>
    <rect x="952" y="788" width="132" height="82" rx="10" fill="#4fa464"/>
    <rect x="974" y="810" width="88" height="38" rx="6" fill="#2a2f34"/>
    <circle cx="982" cy="858" r="5" fill="#f0d55d"/>
    <circle cx="1000" cy="858" r="5" fill="#f0d55d"/>
    <circle cx="1018" cy="858" r="5" fill="#f0d55d"/>
    <circle cx="1036" cy="858" r="5" fill="#f0d55d"/>
    <rect x="952" y="896" width="92" height="64" rx="10" fill="#f1bf5d"/>
    <rect x="1060" y="896" width="56" height="110" rx="10" fill="#2d3135"/>
    <rect x="952" y="980" width="164" height="42" rx="8" fill="#48565d"/>
    <circle cx="1118" cy="1024" r="7" fill="#5bc46a"/>
    <circle cx="1118" cy="1000" r="7" fill="#e57458"/>
    <circle cx="960" cy="1046" r="8" fill="#63747c"/>
    <circle cx="988" cy="1046" r="8" fill="#63747c"/>
    <circle cx="1016" cy="1046" r="8" fill="#63747c"/>
    <path d="M1166 870 C1208 890 1220 940 1210 1002" fill="none" stroke="#6a767b" stroke-width="10" stroke-linecap="round"/>
    <circle cx="1208" cy="1018" r="13" fill="#6a767b"/>
  </g>

  <path d="M896 874 L838 874 L838 820 L816 820" stroke="#414e53" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M896 802 L700 802 L700 694 L668 694" stroke="#414e53" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M896 1008 L848 1008 L848 1030 L816 1030" stroke="#414e53" stroke-width="8" fill="none" stroke-linecap="round"/>

  <g filter="url(#soft)">
    <rect x="698" y="770" width="24" height="28" rx="6" fill="#f5f7f8"/>
    <rect x="722" y="778" width="18" height="12" rx="4" fill="#252a2d"/>
  </g>

  <circle cx="778" cy="1056" r="10" fill="#f3f5f6"/>
  <path d="M774 1064 L774 1105" stroke="#d0d5d7" stroke-width="8" stroke-linecap="round"/>

  <g>
    <rect x="86" y="260" width="350" height="124" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="116" y="310" class="calloutTitle">NoIR camera + IR LEDs</text>
    <text x="116" y="344" class="calloutBody">Mounted above the flap so you get night shots</text>
    <text x="116" y="372" class="calloutBody">before deciding whether to open or keep shut.</text>
    <path d="M436 322 C480 322 494 324 540 632" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="88" y="788" width="354" height="124" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="118" y="838" class="calloutTitle">Motorized cat flap</text>
    <text x="118" y="872" class="calloutBody">This is the actual pet door panel that swings open</text>
    <text x="118" y="900" class="calloutBody">once you approve it from Telegram.</text>
    <path d="M442 856 C458 856 472 856 466 900" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1136" y="242" width="360" height="136" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="1166" y="294" class="calloutTitle">Weatherproof control box</text>
    <text x="1166" y="328" class="calloutBody">Holds the Raspberry Pi, power regulation, fuse,</text>
    <text x="1166" y="356" class="calloutBody">and the control wiring for the whole setup.</text>
    <path d="M1136 348 C1088 388 1064 440 1032 720" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1164" y="610" width="308" height="124" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="1194" y="660" class="calloutTitle">Servo / motor housing</text>
    <text x="1194" y="694" class="calloutBody">A compact actuator cover pulls the flap with</text>
    <text x="1194" y="722" class="calloutBody">a short pushrod so the hardware stays tidy.</text>
    <path d="M1164 690 C1084 714 966 744 816 822" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1140" y="900" width="328" height="118" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="1170" y="950" class="calloutTitle">Reed switch + magnet</text>
    <text x="1170" y="984" class="calloutBody">Tiny sensor pair confirms whether the flap is</text>
    <text x="1170" y="1012" class="calloutBody">really closed before the bot re-locks it.</text>
    <path d="M1140 962 C1040 970 920 990 722 790" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1060" y="1178" width="410" height="132" rx="22" fill="#f7f6f1" stroke="#d9d6cc" stroke-width="3"/>
    <text x="1090" y="1228" class="calloutTitle">Cables exit through sealed glands</text>
    <text x="1090" y="1262" class="calloutBody">Power, camera, and door-sensor lines stay inside a</text>
    <text x="1090" y="1290" class="calloutBody">protected enclosure instead of hanging loose outside.</text>
    <path d="M1060 1238 C1000 1210 930 1140 1168 1016" stroke="#1f2c28" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <text x="140" y="1338" class="tiny">LAYOUT NOTE</text>
  <text x="140" y="1378" class="note">This drawing shows the electronics box on the exterior so every part is visible.</text>
  <text x="140" y="1410" class="note">For a permanent build, keep the camera and actuator outside but move the main box to the indoor side if possible.</text>
</svg>
