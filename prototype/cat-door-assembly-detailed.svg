<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3ed"/>
      <stop offset="100%" stop-color="#f7f0e6"/>
    </linearGradient>
    <linearGradient id="doorFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8d582f"/>
      <stop offset="50%" stop-color="#a46a3a"/>
      <stop offset="100%" stop-color="#6f421f"/>
    </linearGradient>
    <linearGradient id="flap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b6d8e7"/>
      <stop offset="100%" stop-color="#7ca9c2"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8d0d5"/>
      <stop offset="100%" stop-color="#8e989f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#756d61" flood-opacity="0.23"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto">
      <path d="M0,0 L16,8 L0,16 z" fill="#20312b"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, Helvetica, sans-serif; fill: #17211d; }
      .sub { font: 400 24px Arial, Helvetica, sans-serif; fill: #4d5c56; }
      .label { font: 700 23px Arial, Helvetica, sans-serif; fill: #18231f; }
      .body { font: 400 19px Arial, Helvetica, sans-serif; fill: #40514b; }
      .tiny { font: 700 16px Arial, Helvetica, sans-serif; fill: #54655e; letter-spacing: 1.6px; }
      .callout { fill: #fbf8f2; stroke: #d7d0c5; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <rect x="0" y="820" width="1800" height="380" fill="#bd9366"/>
  <rect x="0" y="816" width="1800" height="18" fill="#a97a4f"/>

  <text x="110" y="110" class="title">Prototype 1: Full Assembly Layout</text>
  <text x="110" y="148" class="sub">Outdoor sensor pod on the left, indoor actuator and box on the right</text>

  <g opacity="0.3">
    <rect x="0" y="215" width="1800" height="72" fill="#d1dad0"/>
    <rect x="0" y="331" width="1800" height="72" fill="#d1dad0"/>
    <rect x="0" y="447" width="1800" height="72" fill="#d1dad0"/>
    <rect x="0" y="563" width="1800" height="72" fill="#d1dad0"/>
    <rect x="0" y="679" width="1800" height="72" fill="#d1dad0"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="290" y="168" width="840" height="804" rx="26" fill="#f6f3ef"/>
    <rect x="390" y="208" width="640" height="730" rx="18" fill="url(#doorFace)"/>
    <rect x="440" y="276" width="540" height="598" rx="14" fill="none" stroke="#c89061" stroke-width="6" opacity="0.7"/>
    <rect x="476" y="584" width="296" height="256" rx="24" fill="#21282c"/>
    <rect x="508" y="618" width="232" height="190" rx="14" fill="url(#flap)" stroke="#dceef5" stroke-width="4"/>
    <rect x="558" y="562" width="130" height="28" rx="12" fill="#1c2023"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M420 444 L850 444 L888 510 L390 510 Z" fill="#2c3538"/>
    <rect x="476" y="454" width="210" height="64" rx="16" fill="#21282c"/>
    <circle cx="578" cy="486" r="12" fill="#4a758e"/>
    <circle cx="510" cy="502" r="7" fill="#f0d064"/>
    <circle cx="536" cy="502" r="7" fill="#f0d064"/>
    <circle cx="562" cy="502" r="7" fill="#f0d064"/>
    <circle cx="588" cy="502" r="7" fill="#f0d064"/>
    <circle cx="614" cy="502" r="7" fill="#f0d064"/>
    <circle cx="640" cy="502" r="7" fill="#f0d064"/>
    <circle cx="666" cy="502" r="7" fill="#f0d064"/>
    <circle cx="728" cy="480" r="34" fill="#e7edf1"/>
    <circle cx="728" cy="480" r="14" fill="#cdd8de"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="1088" y="566" width="120" height="300" rx="28" fill="#556066"/>
    <rect x="1108" y="608" width="82" height="112" rx="12" fill="#818b92"/>
    <circle cx="1148" cy="664" r="18" fill="#20272b"/>
    <rect x="1128" y="742" width="40" height="86" rx="12" fill="#99a5ab"/>
    <circle cx="1148" cy="828" r="10" fill="#353d41"/>
  </g>

  <path d="M1148 664 L1012 650" stroke="#a2adb3" stroke-width="12" stroke-linecap="round"/>
  <path d="M1012 650 L1012 585" stroke="#a2adb3" stroke-width="12" stroke-linecap="round"/>
  <circle cx="1012" cy="584" r="16" fill="#d9dfe2"/>

  <g filter="url(#shadow)">
    <rect x="1216" y="512" width="332" height="396" rx="34" fill="#bcc4c9"/>
    <rect x="1242" y="540" width="280" height="340" rx="24" fill="#edf2f4"/>
    <rect x="1282" y="584" width="150" height="90" rx="14" fill="#50a965"/>
    <rect x="1312" y="610" width="92" height="42" rx="8" fill="#293137"/>
    <rect x="1282" y="698" width="104" height="74" rx="14" fill="#f4c45b"/>
    <rect x="1410" y="700" width="72" height="130" rx="12" fill="#33383c"/>
    <rect x="1282" y="790" width="200" height="46" rx="10" fill="#59676f"/>
    <circle cx="1492" cy="810" r="8" fill="#59c26a"/>
    <circle cx="1492" cy="784" r="8" fill="#ea7a5c"/>
    <rect x="1242" y="860" width="280" height="20" rx="10" fill="#dbe3e6"/>
  </g>

  <path d="M1216 656 L1188 656 L1188 664 L1208 664" stroke="#4f5c62" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M1216 820 L1154 820 L1154 878" stroke="#4f5c62" stroke-width="8" fill="none" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="775" y="690" width="18" height="24" rx="5" fill="#f4f6f7"/>
    <rect x="793" y="696" width="18" height="12" rx="4" fill="#1f2428"/>
  </g>

  <g>
    <rect x="86" y="236" width="360" height="122" rx="22" class="callout"/>
    <text x="116" y="286" class="label">RAIN HOOD</text>
    <text x="116" y="320" class="body">Keeps water off the PIR dome, camera,</text>
    <text x="116" y="348" class="body">and IR boards.</text>
    <path d="M446 296 C510 302 540 344 580 444" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="70" y="456" width="370" height="136" rx="22" class="callout"/>
    <text x="100" y="508" class="label">CAMERA 3 NOIR + PIR</text>
    <text x="100" y="542" class="body">Camera in the middle, PIR to one side,</text>
    <text x="100" y="570" class="body">IR LEDs around it.</text>
    <path d="M440 540 C498 534 582 512 666 488" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="68" y="692" width="372" height="128" rx="22" class="callout"/>
    <text x="98" y="742" class="label">CAT FLAP FRAME</text>
    <text x="98" y="776" class="body">This is the off-the-shelf flap you mount</text>
    <text x="98" y="804" class="body">through the lower door panel.</text>
    <path d="M440 762 C504 760 566 742 616 712" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1406" y="220" width="312" height="132" rx="22" class="callout"/>
    <text x="1436" y="272" class="label">SERVO INSIDE</text>
    <text x="1436" y="306" class="body">Keep the motor on the dry side and only</text>
    <text x="1436" y="334" class="body">run a short linkage through.</text>
    <path d="M1406 300 C1314 324 1238 414 1148 566" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1418" y="430" width="320" height="132" rx="22" class="callout"/>
    <text x="1448" y="482" class="label">CONTROL BOX</text>
    <text x="1448" y="516" class="body">Pi Zero, fuse, buck regulator, and the</text>
    <text x="1448" y="544" class="body">servo wiring all land here.</text>
    <path d="M1418 498 C1368 516 1328 546 1306 572" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1404" y="742" width="328" height="126" rx="22" class="callout"/>
    <text x="1434" y="792" class="label">REED SWITCH</text>
    <text x="1434" y="826" class="body">Tiny sensor on the flap frame confirms</text>
    <text x="1434" y="854" class="body">the door shut again.</text>
    <path d="M1404 812 C1316 856 980 838 790 706" stroke="#20312b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="1220" y="940" width="460" height="154" rx="24" class="callout"/>
    <text x="1250" y="994" class="label">BUILD IDEA</text>
    <text x="1250" y="1030" class="body">Outside only needs the camera pod, flap, and reed switch.</text>
    <text x="1250" y="1058" class="body">Put the Pi, power, and servo on the inside so waterproofing stays easier.</text>
  </g>

  <text x="110" y="1042" class="tiny">OUTDOOR / INDOOR SPLIT</text>
  <text x="110" y="1082" class="body">Use this layout as the main build direction. It is the cleanest way to copy the idea into a real door.</text>
</svg>
